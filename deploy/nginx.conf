server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Strong cache for hashed assets, no cache for HTML.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /healthz {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/wasm;
    gzip_min_length 1024;

    # Pull in nginx's default mime-types map (text/html for .html, etc.) so
    # the SPA isn't served as application/octet-stream and force-downloaded
    # by the browser. Then layer the wasm mapping on top.
    include /etc/nginx/mime.types;
    types {
        application/wasm wasm;
    }
    default_type application/octet-stream;
}
