# ulogd2 configuration for Stage C destination IP capture via NFLOG.
# Reads netfilter NFLOG events from the WG container and emits JSON.

[global]
loglevel=5
logfile="/var/log/ulogd/ulogd.log"

# NFLOG input plugin (from kernel netfilter NFLOG target)
[input]
plugin="NFLOG"
group=100

# JSON output (prints to stdout for container log capture)
[output]
plugin="JSON"
file="/dev/stdout"

# Stack: NFLOG → JSON
[ct_event1]
assert=ct_event
