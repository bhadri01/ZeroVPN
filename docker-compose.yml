name: zerovpn

# Reusable bits
x-restart: &default-restart
  restart: unless-stopped

x-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  caddy:
    image: caddy:2.11-alpine
    <<: [*default-restart, *default-logging]
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web
    depends_on:
      - api
      - frontend

  frontend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.web
    <<: [*default-restart, *default-logging]
    networks:
      - web
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3

  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    <<: [*default-restart, *default-logging]
    env_file: .env
    environment:
      ZEROVPN_BIND_ADDRESS: 0.0.0.0:8080
    networks:
      - web
      - backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      worker:
        condition: service_started
    # No HTTP healthcheck inside distroless (no curl/wget). Caddy upstream
    # will fail-open quickly if api is down; we'll add a self-probe binary
    # mode in 1B if needed.
    mem_limit: 256m

  worker:
    build:
      context: .
      dockerfile: deploy/Dockerfile.worker
    <<: [*default-restart, *default-logging]
    env_file: .env
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
    mem_limit: 192m

  db:
    image: postgres:18-alpine
    <<: [*default-restart, *default-logging]
    environment:
      POSTGRES_DB: zerovpn
      POSTGRES_USER: zerovpn
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    # Postgres 18+ images expect the volume at /var/lib/postgresql (parent),
    # so pg_upgrade --link works without crossing mount boundaries. Data
    # lands in /var/lib/postgresql/<major>/.
    volumes:
      - pg_data:/var/lib/postgresql
      - ./secrets/db_password.txt:/run/secrets/db_password:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zerovpn -d zerovpn"]
      interval: 5s
      timeout: 3s
      retries: 10
    command:
      - postgres
      - -c
      - shared_buffers=64MB
      - -c
      - work_mem=4MB
      - -c
      - maintenance_work_mem=32MB
      - -c
      - effective_cache_size=256MB
      - -c
      - max_connections=50
      - -c
      - random_page_cost=1.1
    mem_limit: 320m

  redis:
    image: redis:8-alpine
    <<: [*default-restart, *default-logging]
    command:
      - redis-server
      - --maxmemory
      - 64mb
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - ""
      - --appendonly
      - "no"
    networks:
      - backend
    mem_limit: 96m

  # WireGuard runtime — opt-in via the `wg` profile so the rest of the
  # stack works on macOS Docker Desktop where the WG kernel module may not
  # be available. Run as:
  #   docker compose --profile wg up -d
  # In production on a Linux host with the kernel module, also flip
  # ZEROVPN_WG__BACKEND=shell on the api+worker so they call `wg set`
  # against the running interface.
  wg:
    image: linuxserver/wireguard:latest
    profiles: ["wg"]
    <<: [*default-restart, *default-logging]
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    network_mode: host
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: UTC
      INTERNAL_SUBNET: "10.10.0.0/22"
      SERVERPORT: "51820"
      # We supply our own wg0.conf — written by the api on first boot.
      # Disable the image's auto-config-generation entirely.
      PEERS: "0"
    volumes:
      - wg_config:/config
      - /lib/modules:/lib/modules:ro
    mem_limit: 64m

  dnsmasq:
    image: jpillora/dnsmasq:latest
    <<: [*default-restart, *default-logging]
    cap_add:
      - NET_ADMIN
    volumes:
      - dnsmasq_conf:/etc/dnsmasq.d
    networks:
      - backend
    mem_limit: 32m
    # The jpillora image runs dnsmasq with default opts; we provide our own
    # additional hosts file via the mounted volume. dnsmasq picks up changes
    # to addn-hosts on SIGHUP. For 1A we just point it at our own dir.
    environment:
      HTTP_USER: zero
      HTTP_PASS: zero  # admin UI password (we don't expose this externally)
    entrypoint: ["/bin/sh", "-c"]
    # Touch the peers file so dnsmasq doesn't warn on first boot, then exec
    # dnsmasq with our config. The worker overwrites zerovpn-peers.conf
    # whenever a device's DNS names change, and SIGHUPs dnsmasq.
    command:
      - >
        mkdir -p /etc/dnsmasq.d &&
        touch /etc/dnsmasq.d/zerovpn-peers.conf &&
        exec dnsmasq
        --keep-in-foreground
        --log-facility=-
        --addn-hosts=/etc/dnsmasq.d/zerovpn-peers.conf
        --no-resolv
        --server=1.1.1.1
        --server=1.0.0.1

volumes:
  caddy_data:
  caddy_config:
  pg_data:
  dnsmasq_conf:
  wg_config:

networks:
  web:
  backend:
    internal: false
