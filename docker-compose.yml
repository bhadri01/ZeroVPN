name: zerovpn

# Single compose file. Per-environment values come from `.env`; optional
# service groups are gated by profiles:
#
#   docker compose --profile dev up -d                          # core + MailHog (default for `make up`)
#   docker compose up -d                                        # core only — prod-shape (no MailHog)
#   docker compose --profile observability up -d                # add Prometheus + Grafana + Loki + nightly backup
#   docker compose --profile wg up -d                           # add the WireGuard kernel container
#   docker compose --profile ingest up -d                       # add the nflog-exporter
#
# Profiles compose; `--profile dev --profile observability` brings up both.
# Dev vs. prod knobs (Caddyfile path, RUST_LOG, ZEROVPN_DOMAIN, SMTP relay,
# secrets) live in `.env`. See `.env.example` for the full set.

x-restart: &default-restart
  restart: unless-stopped

x-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  caddy:
    image: caddy:2.11-alpine
    <<: [*default-restart, *default-logging]
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ${ZEROVPN_CADDYFILE:-./deploy/Caddyfile.dev}:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web
    depends_on:
      - api
      - frontend
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    security_opt:
      - no-new-privileges:true

  frontend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.web
    <<: [*default-restart, *default-logging]
    networks:
      - web
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
    cap_drop: [ALL]
    cap_add: [CHOWN, SETUID, SETGID, NET_BIND_SERVICE]
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=32m
      - /var/cache/nginx:size=32m
      - /var/run:size=8m

  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
    <<: [*default-restart, *default-logging]
    env_file: .env
    environment:
      ZEROVPN_BIND_ADDRESS: 0.0.0.0:8080
    ports:
      # Loopback-only — for native debugging via host. Safe to leave in prod.
      - "127.0.0.1:18080:8080"
    networks:
      - web
      - backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      worker:
        condition: service_started
    volumes:
      - wg_config:/wg
      # Shared with the `dnsmasq` (CoreDNS) service: the API writes the
      # per-peer hosts file here (routes/dns.rs::sync_dnsmasq →
      # ZEROVPN_WG__DNSMASQ_HOSTS_FILE=/etc/dnsmasq.d/zerovpn-peers.conf)
      # and CoreDNS serves it. Without this mount the write lands in the
      # API's read-only rootfs and never reaches the resolver, so
      # `*.vpn.local` names never resolve.
      - dnsmasq_conf:/etc/dnsmasq.d
    read_only: true
    tmpfs:
      - /tmp:size=64m
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m

  worker:
    build:
      context: .
      dockerfile: deploy/Dockerfile.worker
    <<: [*default-restart, *default-logging]
    env_file: .env
    environment:
      ZEROVPN_INGEST__DEST_BIND: 0.0.0.0:9898
    ports:
      # Loopback-only ZMQ for native api debugging.
      - "127.0.0.1:5555:5555"
      # destination_ingest TCP endpoint — public-facing so external nflog
      # exporters can connect.
      - "9898:9898"
    networks:
      - backend
    depends_on:
      db:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp:size=64m
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    mem_limit: 192m
    # --- Real-WG stats capture (shell/kernel backend) -------------------
    # By default the worker is on the `backend` bridge (above) and the WG
    # stats poller is disabled (ZEROVPN_WG__BACKEND=noop). To capture peer
    # endpoints, connection sessions, handshakes and per-peer bandwidth, the
    # poller runs `wg show <iface> dump`, which needs (a) CAP_NET_ADMIN and
    # (b) visibility of the WG interface's network namespace.
    #
    # On a Linux host running the tunnel (the `wg` service, network_mode:
    # host → wg0 lives in the host netns), enable capture by REPLACING the
    # `networks: [backend]` block above with the host netns and adding the
    # cap, then set ZEROVPN_WG__BACKEND=kernel (or shell) in .env:
    #
    #   network_mode: "service:wg"     # share wg's (host) netns; see wg0
    #   cap_add: [NET_ADMIN]
    #   # security_opt no-new-privileges must be dropped for the cap to apply
    #
    # Trade-off: in that netns the worker no longer resolves db/redis/api by
    # service name. db and redis already publish to host loopback
    # (127.0.0.1:55432, 127.0.0.1:56379), so point ZEROVPN_DATABASE_URL /
    # the redis URL at those, and have the api subscribe to the worker's ZMQ
    # over the host instead of `worker:5555`. Verify api↔worker connectivity
    # after the switch — that link is the main thing this move breaks.

  db:
    image: postgres:18-alpine
    <<: [*default-restart, *default-logging]
    environment:
      POSTGRES_DB: zerovpn
      POSTGRES_USER: zerovpn
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    volumes:
      # Postgres 18+ expects the volume at the parent dir so pg_upgrade --link
      # works without crossing mount boundaries; data lands in
      # /var/lib/postgresql/<major>/.
      - pg_data:/var/lib/postgresql
      - ./secrets/db_password.txt:/run/secrets/db_password:ro
    ports:
      - "127.0.0.1:55432:5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zerovpn -d zerovpn"]
      interval: 5s
      timeout: 3s
      retries: 10
    command:
      - postgres
      - -c
      - shared_buffers=64MB
      - -c
      - work_mem=4MB
      - -c
      - maintenance_work_mem=32MB
      - -c
      - effective_cache_size=256MB
      - -c
      - max_connections=50
      - -c
      - random_page_cost=1.1
    mem_limit: 320m

  redis:
    image: redis:8-alpine
    <<: [*default-restart, *default-logging]
    command:
      - redis-server
      - --maxmemory
      - 64mb
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - ""
      - --appendonly
      - "no"
    ports:
      - "127.0.0.1:56379:6379"
    networks:
      - backend
    mem_limit: 96m

  dnsmasq:
    image: coredns/coredns:latest
    platform: linux/amd64
    <<: [*default-restart, *default-logging]
    cap_add:
      - NET_BIND_SERVICE
    volumes:
      - dnsmasq_conf:/etc/dnsmasq.d
      - ./deploy/Corefile:/etc/coredns/Corefile:ro
    networks:
      backend:
        # Stable address the wg0 DNS DNAT forwards peer queries to. Keep in
        # sync with ZEROVPN_WG__DNS_FORWARD_IP (.env) — the API bakes that
        # value into wg0.conf's PostUp rules.
        ipv4_address: 172.30.0.53
    mem_limit: 32m
    command:
      - -conf
      - /etc/coredns/Corefile

  mailhog:
    image: mailhog/mailhog:latest
    platform: linux/amd64
    profiles: [dev]
    restart: unless-stopped
    ports:
      - "8025:8025"  # web UI
      - "1025:1025"  # smtp
    networks:
      - backend
    mem_limit: 64m

  # WireGuard runtime — opt-in via the `wg` profile so the rest of the
  # stack works on macOS Docker Desktop where the WG kernel module may not
  # be available. On a Linux host with the kernel module, set
  # ZEROVPN_WG__BACKEND=kernel in .env so api+worker drive peers via the
  # netlink UAPI directly (no `wg` binary, no nsenter).
  wg:
    image: linuxserver/wireguard:latest
    profiles: [wg]
    <<: [*default-restart, *default-logging]
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    network_mode: host
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: UTC
      INTERNAL_SUBNET: "10.10.0.0/22"
      SERVERPORT: "51820"
      # We supply our own wg0.conf — written by the api on first boot.
      PEERS: "0"
    volumes:
      - wg_config:/config
      - /lib/modules:/lib/modules:ro
    mem_limit: 64m

  nflog-exporter:
    build:
      context: .
      dockerfile: deploy/Dockerfile.nflog-exporter
    profiles: [ingest]
    <<: [*default-restart, *default-logging]
    networks:
      - backend
    depends_on:
      - worker
    environment:
      INGEST_ENDPOINT: worker:9898
    stdin_open: true
    tty: false
    mem_limit: 32m

  # ── Observability + backups (profile: observability) ───────────────────
  prometheus:
    image: prom/prometheus:latest
    profiles: [observability]
    restart: unless-stopped
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    networks:
      - backend
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=14d
    mem_limit: 256m

  grafana:
    image: grafana/grafana-oss:latest
    profiles: [observability]
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: dark
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_ROOT_URL: "http://localhost/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - backend
    mem_limit: 128m

  loki:
    image: grafana/loki:latest
    profiles: [observability]
    restart: unless-stopped
    volumes:
      - ./deploy/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - backend
    mem_limit: 256m

  promtail:
    image: grafana/promtail:latest
    profiles: [observability]
    restart: unless-stopped
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./deploy/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - backend
    mem_limit: 96m

  # Nightly encrypted backup of the Postgres volume + secrets dir.
  # Set ZEROVPN_BACKUP_AGE_RECIPIENT in .env to age-encrypt the tarball;
  # without it, archives land in `backup_data` unencrypted.
  backup:
    image: offen/docker-volume-backup:v2
    profiles: [observability]
    restart: unless-stopped
    environment:
      BACKUP_CRON_EXPRESSION: "0 3 * * *"
      BACKUP_FILENAME: "zerovpn-{{ .Year }}{{ printf \"%02d\" (int .Month) }}{{ printf \"%02d\" .Day }}.tar.gz"
      BACKUP_RETENTION_DAYS: "14"
      AGE_PUBLIC_KEYS: "${ZEROVPN_BACKUP_AGE_RECIPIENT:-}"
      BACKUP_PRUNING_LEEWAY: "30m"
    volumes:
      - pg_data:/backup/db:ro
      - backup_data:/archive
      - ./secrets:/backup/secrets:ro
    networks:
      - backend
    mem_limit: 96m

volumes:
  caddy_data:
  caddy_config:
  pg_data:
  dnsmasq_conf:
  wg_config:
  prom_data:
  grafana_data:
  loki_data:
  backup_data:

networks:
  web:
  backend:
    internal: false
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"
    # Fixed subnet so the resolver (CoreDNS / `dnsmasq` service) can take a
    # stable IP that the wg0 DNS DNAT targets — see ZEROVPN_WG__DNS_FORWARD_IP
    # and the PostUp rules generated in bootstrap.rs / admin rotate-keys.
    ipam:
      config:
        - subnet: 172.30.0.0/24
