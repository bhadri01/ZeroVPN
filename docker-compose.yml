name: zerovpn

# Single compose file. Per-environment values come from `.env`; optional
# service groups are gated by profiles:
#
#   docker compose --profile dev up -d                          # core + MailHog (default for `make up`)
#   docker compose up -d                                        # core only — prod-shape (no MailHog)
#
# The api is the WireGuard host itself (brings up wg0 + programs peers), so
# there is no separate `wg` container. The only optional service group is the
# `dev`-profile MailHog.
# Dev vs. prod knobs (TLS cert resolver, RUST_LOG, ZEROVPN_DOMAIN, SMTP relay,
# secrets) live in `.env`. See `.env.example` for the full set.

x-restart: &default-restart
  restart: unless-stopped

x-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  traefik:
    image: traefik:v3.3
    <<: [*default-restart, *default-logging]
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
    command:
      - --api.dashboard=false
      - --ping=true
      - --global.checknewversion=false
      - --global.sendanonymoususage=false
      # Routing (routers/services/middlewares) is env-independent and lives in
      # the file provider; TLS is env-driven on the entrypoint below.
      - --providers.file.filename=/etc/traefik/dynamic.yml
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.le.acme.email=${ZEROVPN_ACME_EMAIL:-admin@localhost}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.tlschallenge=true
      # Dev: ZEROVPN_CERT_RESOLVER empty -> Traefik's self-signed default cert
      # (no ACME, avoids LE rate limits on localhost). Prod: set
      # ZEROVPN_CERT_RESOLVER=le in .env for a Let's Encrypt cert on ${ZEROVPN_DOMAIN}.
      - --entrypoints.websecure.http.tls.certResolver=${ZEROVPN_CERT_RESOLVER:-}
      - --entrypoints.websecure.http.tls.domains[0].main=${ZEROVPN_DOMAIN:-localhost}
    volumes:
      - ./deploy/traefik-dynamic.yml:/etc/traefik/dynamic.yml:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - web
    depends_on:
      - api
      - frontend
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 3s
      retries: 3
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    security_opt:
      - no-new-privileges:true

  frontend:
    image: ${ZEROVPN_REGISTRY:-ghcr.io/bhadri01}/zerovpn-frontend:${ZEROVPN_IMAGE_TAG:-latest}
    <<: [*default-restart, *default-logging]
    networks:
      - web
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
    cap_drop: [ALL]
    cap_add: [CHOWN, SETUID, SETGID, NET_BIND_SERVICE]
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=32m
      - /var/cache/nginx:size=32m
      - /var/run:size=8m

  # The api is the WireGuard host: on boot it brings wg0 up from the DB-stored
  # server key (bootstrap::ensure_wg_interface_up) and programs peers directly,
  # so there is no separate `wg` container and the api mounts no wg_config
  # volume — it holds zero durable state (everything is in Postgres). The cost:
  # the internet-facing api now runs privileged (NET_ADMIN) instead of
  # cap_drop-ALL/read-only. See docs/architecture.md → "WireGuard runtime".
  #
  # ⚠ Verified on macOS/dev (userspace boringtun). The prod path below (Linux
  # kernel WG module) has NOT been validated on a real host — test before relying.
  api:
    image: ${ZEROVPN_REGISTRY:-ghcr.io/bhadri01}/zerovpn-api:${ZEROVPN_IMAGE_TAG:-latest}
    <<: [*default-restart, *default-logging]
    env_file: .env
    environment:
      ZEROVPN_BIND_ADDRESS: 0.0.0.0:8080
      ZEROVPN_WG__BACKEND: kernel
      ZEROVPN_WG__INTERFACE: wg0
      ZEROVPN_WG__SERVER_CONFIG_PATH: /wg/wg0.conf
      # The worker shares THIS container's netns (see worker.network_mode) so it
      # can see wg0 for stats; its ZMQ publisher is therefore on loopback here.
      ZEROVPN_EVENTS__SUBSCRIBER_CONNECT: tcp://127.0.0.1:5555
    ports:
      # Loopback-only — for native debugging via host. Safe to leave in prod.
      - "127.0.0.1:18080:8080"
      # WireGuard — reachable from the internet (the api is the WG endpoint now).
      - "51820:51820/udp"
      # Loopback ZMQ, published on behalf of the `worker` (it shares this netns).
      - "127.0.0.1:5555:5555"
    networks:
      - web
      - backend
    depends_on:
      # NOT the worker anymore — the worker shares this container's netns, so it
      # must start *after* the api (see worker.depends_on). The api's ZMQ
      # subscriber just retries until the worker's publisher is up.
      db:
        condition: service_healthy
    volumes:
      # Shared with the `dnsmasq` (CoreDNS) service: the API writes the per-peer
      # hosts file here (routes/dns.rs::sync_dnsmasq) and CoreDNS serves it.
      # Derived from the DB, regenerated on boot — not durable state.
      - dnsmasq_conf:/etc/dnsmasq.d
      # Host kernel modules (read-only) so wg-quick can load the wireguard
      # module. Unneeded if the host preloads it (`modprobe wireguard`).
      - /lib/modules:/lib/modules:ro
    # wg0.conf + wg-quick runtime state live on tmpfs — ephemeral, rebuilt from
    # the DB each boot.
    tmpfs:
      - /tmp:size=64m
      - /wg:size=1m
      - /run:size=1m
    cap_drop: [ALL]
    cap_add: [NET_ADMIN, SYS_MODULE]
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    mem_limit: 256m

  # Shares the api's network namespace so its wg_poller can see wg0 (`wg show`)
  # for per-peer stats. Because of that it has no own `networks:`/`ports:` — its
  # ZMQ publisher (5555) is published by the `api` container, and the api
  # subscribes to it on 127.0.0.1:5555. Mirrors the dev topology; requires the
  # api to start first (depends_on below).
  worker:
    image: ${ZEROVPN_REGISTRY:-ghcr.io/bhadri01}/zerovpn-worker:${ZEROVPN_IMAGE_TAG:-latest}
    <<: [*default-restart, *default-logging]
    env_file: .env
    environment:
      ZEROVPN_EVENTS__PUBLISHER_BIND: tcp://0.0.0.0:5555
      ZEROVPN_WG__BACKEND: kernel
      ZEROVPN_WG__INTERFACE: wg0
    network_mode: "service:api"
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
    read_only: true
    tmpfs:
      - /tmp:size=64m
    cap_drop: [ALL]
    cap_add: [NET_ADMIN]
    mem_limit: 192m

  db:
    image: postgres:18-alpine
    <<: [*default-restart, *default-logging]
    environment:
      POSTGRES_DB: zerovpn
      POSTGRES_USER: zerovpn
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    volumes:
      # Postgres 18+ expects the volume at the parent dir so pg_upgrade --link
      # works without crossing mount boundaries; data lands in
      # /var/lib/postgresql/<major>/.
      - pg_data:/var/lib/postgresql
      - ./secrets/db_password.txt:/run/secrets/db_password:ro
    ports:
      - "127.0.0.1:55432:5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zerovpn -d zerovpn"]
      interval: 5s
      timeout: 3s
      retries: 10
    command:
      - postgres
      - -c
      - shared_buffers=64MB
      - -c
      - work_mem=4MB
      - -c
      - maintenance_work_mem=32MB
      - -c
      - effective_cache_size=256MB
      - -c
      - max_connections=50
      - -c
      - random_page_cost=1.1
    mem_limit: 320m

  dnsmasq:
    image: coredns/coredns:latest
    platform: linux/amd64
    <<: [*default-restart, *default-logging]
    cap_add:
      - NET_BIND_SERVICE
    volumes:
      - dnsmasq_conf:/etc/dnsmasq.d
      - ./deploy/Corefile:/etc/coredns/Corefile:ro
    networks:
      backend:
        # Stable address the wg0 DNS DNAT forwards peer queries to. Keep in
        # sync with ZEROVPN_WG__DNS_FORWARD_IP (.env) — the API bakes that
        # value into wg0.conf's PostUp rules.
        ipv4_address: 172.30.0.53
    mem_limit: 32m
    command:
      - -conf
      - /etc/coredns/Corefile

  # (The separate `wg` container was removed: the api is the WG host now — it
  # brings up wg0 itself and programs peers. See the `api` service above.)

volumes:
  traefik_letsencrypt:
  pg_data:
  dnsmasq_conf:

networks:
  web:
  backend:
    internal: false
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"
    # Fixed subnet so the resolver (CoreDNS / `dnsmasq` service) can take a
    # stable IP that the wg0 DNS DNAT targets — see ZEROVPN_WG__DNS_FORWARD_IP
    # and the PostUp rules generated in bootstrap.rs / admin rotate-keys.
    ipam:
      config:
        - subnet: 172.30.0.0/24
