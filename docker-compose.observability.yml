# Optional observability stack. Run with:
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml up -d
#
# Adds Prometheus scraping the api `/metrics` endpoint and Grafana with the
# Prometheus datasource pre-provisioned. Loki/Promtail come in 1C polish.
name: zerovpn

# Optional observability + backups stack. Run with:
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml up -d
#
# Brings up Prometheus + Grafana (with the api `/metrics` scraped + datasource
# pre-provisioned), Loki + Promtail for centralized container logs, and a
# nightly backup container that age-encrypts pg_data + secrets.

services:
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prom_data:/prometheus
    networks:
      - backend
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=14d
    mem_limit: 256m

  grafana:
    image: grafana/grafana-oss:latest
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: dark
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_ROOT_URL: "http://localhost/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - backend
    mem_limit: 128m

  loki:
    image: grafana/loki:latest
    restart: unless-stopped
    volumes:
      - ./deploy/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - backend
    mem_limit: 256m

  promtail:
    image: grafana/promtail:latest
    restart: unless-stopped
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./deploy/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - backend
    mem_limit: 96m

  # Nightly encrypted backup of the Postgres volume + secrets dir.
  # Configure ZEROVPN_BACKUP_AGE_RECIPIENT to enable; without it, files
  # land in `backup_data` unencrypted (still off-volume, still useful).
  backup:
    image: offen/docker-volume-backup:v2
    restart: unless-stopped
    environment:
      BACKUP_CRON_EXPRESSION: "0 3 * * *"
      BACKUP_FILENAME: "zerovpn-{{ .Year }}{{ printf \"%02d\" (int .Month) }}{{ printf \"%02d\" .Day }}.tar.gz"
      BACKUP_RETENTION_DAYS: "14"
      AGE_PUBLIC_KEYS: "${ZEROVPN_BACKUP_AGE_RECIPIENT:-}"
      BACKUP_PRUNING_LEEWAY: "30m"
    volumes:
      - pg_data:/backup/db:ro
      - backup_data:/archive
      - ./secrets:/backup/secrets:ro
    networks:
      - backend
    mem_limit: 96m

volumes:
  prom_data:
  grafana_data:
  loki_data:
  backup_data:
