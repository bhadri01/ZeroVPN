name: images

# Build the app images (api / worker / frontend / nflog-exporter) and push them
# to GHCR. Deploy hosts then pull these by tag (docker-compose.yml is
# image-only) instead of building at deploy time.
#
#   - push to main   -> pushes :latest (+ :<sha>)
#   - push a tag v*  -> pushes :<tag>  (+ :<sha>)

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-push:
    name: build + push images
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve registry + tag
        run: |
          # GHCR namespace must be lowercase.
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "ZEROVPN_REGISTRY=ghcr.io/${owner}" >> "$GITHUB_ENV"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "ZEROVPN_IMAGE_TAG=${{ github.ref_name }}" >> "$GITHUB_ENV"
          else
            echo "ZEROVPN_IMAGE_TAG=latest" >> "$GITHUB_ENV"
          fi

      - name: Build + push (moving tag)
        run: |
          docker compose -f docker-compose.yml -f docker-compose.build.yml build
          docker compose -f docker-compose.yml -f docker-compose.build.yml push

      # Also publish an immutable :<sha> tag for reproducible deploys.
      - name: Build + push (:sha)
        env:
          ZEROVPN_IMAGE_TAG: ${{ github.sha }}
        run: |
          docker compose -f docker-compose.yml -f docker-compose.build.yml build
          docker compose -f docker-compose.yml -f docker-compose.build.yml push
