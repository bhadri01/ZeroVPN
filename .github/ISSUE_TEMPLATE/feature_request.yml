name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The use case or pain point. "I'm always frustrated when…"
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about, and why they fall short.
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      description: ZeroVPN is a self-hosted, split-tunnel private-network VPN — not a full-tunnel/anonymity product.
      options:
        - label: This fits ZeroVPN's scope as described in the README.
