# Build overlay — adds `build:` back to the app services so their images can be
# built (and pushed) locally / in CI. The base docker-compose.yml references
# pre-built images (`image:`) only, so a *deploy* host pulls and never builds.
#
#   Build + tag:  docker compose -f docker-compose.yml -f docker-compose.build.yml build   (make images)
#   Push:         docker compose -f docker-compose.yml -f docker-compose.build.yml push     (make push)
#   Local run:    docker compose -f docker-compose.yml -f docker-compose.build.yml --profile dev up -d --build   (make up)
#
# Each service keeps the `image:` from the base file, so `build` tags it with
# the ${ZEROVPN_REGISTRY}/...:${ZEROVPN_IMAGE_TAG} name ready to push.
#
# Deploy hosts are x86_64, so builds target linux/amd64 regardless of the
# build machine (on an Apple Silicon Mac this cross-builds via Rosetta —
# slower, but the pushed image actually runs on the server). Set
# ZEROVPN_BUILD_PLATFORM=linux/arm64 for a fast native image for `make up`.
services:
  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile.api
      platforms: ["${ZEROVPN_BUILD_PLATFORM:-linux/amd64}"]
  worker:
    build:
      context: .
      dockerfile: deploy/Dockerfile.worker
      platforms: ["${ZEROVPN_BUILD_PLATFORM:-linux/amd64}"]
  frontend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.web
      platforms: ["${ZEROVPN_BUILD_PLATFORM:-linux/amd64}"]
