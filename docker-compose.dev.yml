# Dev overrides: bind-mounted source for hot reload, MailHog, exposed dev ports.
name: zerovpn

services:
  api:
    ports:
      - "8080:8080"
    environment:
      RUST_LOG: "debug,zerovpn=trace"

  worker:
    ports:
      - "5555:5555"
    environment:
      # Faster simulator cadence in dev so the topology graph comes alive
      # immediately after a device is added. Production drops back to 30s
      # once the real WG poller (Phase 1B-C) replaces the simulator.
      ZEROVPN_STATS_INTERVAL_SECS: "5"

  # Non-standard host ports for db/redis so we don't fight any other local
  # Postgres/Redis instances already bound to the conventional ports.
  db:
    ports:
      - "55432:5432"

  redis:
    ports:
      - "56379:6379"

  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "8025:8025"  # web UI
      - "1025:1025"  # smtp
    networks:
      - backend
    mem_limit: 64m
